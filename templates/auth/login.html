<!DOCTYPE html>
<html lang="en">

<head>
    {%include 'partials/_head.html'%}
        <style>
            html,
            body {
            height: 90%;
            }

            .form-signin {
            max-width: 330px;
            padding: 1rem;
            }

            .form-signin .form-floating:focus-within {
            z-index: 2;
            }

            .form-signin input[type="email"] {
            margin-bottom: -1px;
            border-bottom-right-radius: 0;
            border-bottom-left-radius: 0;
            }

            .form-signin input[type="password"] {
            margin-bottom: 10px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            }
        </style>
</head>

<body class="d-flex align-items-center py-4 ">
    <main class="form-signin w-100 m-auto">
        <form action="login" method="post"> <img class="mb-4" src="/static/img/brand-icon.png" alt="" width="70" height="70">
            <h1 class="h3 mb-3 fw-normal">Log-in</h1>
            <div class="form-floating"> <input type="text" class="form-control" id="floatingInput"
                    placeholder="login" name="nome"> <label for="floatingInput">Usuário</label> </div>
            <div class="form-floating"> <input type="password" class="form-control" id="floatingPassword"
                    placeholder="senha" name="senha"> <label for="floatingPassword">Senha</label> </div>
            <label>Não tem uma conta? <a href="/cadastrar">Cadastre-se</a></label>
            <button class="btn btn-primary w-100 py-2 mt-5" type="submit" value="login">Entrar</button>
        </form>
    </main>
</body>

</html>
