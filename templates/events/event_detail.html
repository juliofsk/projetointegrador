<!DOCTYPE html>
<html lang="en">
<head>
    {%include 'partials/_head.html'%}
    <style>
        #lista{
            background-color: rgb(39, 39, 39);
            border-radius: 5px;
            padding-left: 5px;
            padding-right: 5px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    {%if not is_admin%}

        <div class="container d-flex flex-row align-items-center justify-content-between mt-5 mb-5">
            <div><h2 class="">{{ evento[2] }}</h2></div>
            <form action="/evento/solicitar" method="POST">
                <input type="hidden" name="evento_id" value="{{ evento[0] }}">
                <button class="btn btn-primary w-5 py-2 mt-3">Entrar</button>
            </form>
        </div>
 
    {%endif%}

    {%if is_admin%}

    <div class="container d-flex flex-row align-items-center justify-content-between mt-5 mb-5">
        <div><h2 class="">{{ evento[2] }}</h2></div>
        <form action="/evento/deletar" method="POST">
            <input type="hidden" name="evento_id" value="{{ evento[0] }}">
            <button class="btn btn-primary w-5 py-2 mt-3">Deletar evento</button>
        </form>
    </div>
    
    <div class="container">


    <div>
        <h3>Solicitações</h3>
    </div>    

        {% include 'events_requests' %}
    
    </div>

    {%endif%}

<div class="container">
    <div>
        <h3>Lista</h3>
    </div>    

    <div id="lista">
        {%for usuario in usuarios%}
            <div class="row py-2">
                <div class="col">
                    <img class="me-4" src="static/img/experson-icon.png">    
                    {{ usuario[1] }}
                </div>
                <div class="col d-flex justify-content-end">
                    <div>
                        <input type="checkbox">
                    </div>
                </div>
            </div>
        {%endfor%}
    </div>
</div>

</body>
</html>
