<!DOCTYPE html>
<html lang="en">

<head>
    {%include 'partials/_head.html'%}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        #lista {
            background-color: rgb(39, 39, 39);
            border-radius: 5px;
            padding-left: 5px;
            padding-right: 5px;
            margin-bottom: 20px;
        }

        .modal-backdrop.show {
            opacity: 0.75;
        }

        .modal-content {
            background: #18191f;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.45);
            color: #f5f5f5;
        }

        .modal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1rem 1.25rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #ffffff;
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
            opacity: 0.8;
        }

        .btn-close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 1.25rem;
        }

        .form-floating>.form-control {
            background-color: #23252d;
            border: 1px solid #31343d;
            color: #ffffff;
            border-radius: 12px;
        }

        .form-floating>.form-control:focus {
            background-color: #23252d;
            color: #ffffff;
            border-color: #ff5c7c;
            box-shadow: 0 0 0 0.2rem rgba(255, 92, 124, 0.15);
        }

        .form-floating>label {
            color: #b8bcc7;
        }

        input[type="date"],
        input[type="time"] {
            color-scheme: dark;
        }

        .btn-evento {
            background-color: #ff5c7c;
            border: none;
            color: #fff;
            font-weight: 600;
            border-radius: 12px;
        }

        .btn-evento:hover {
            background-color: #e14d6c;
        }

        .btn-secundario-dark {
            background-color: transparent;
            border: 1px solid #3a3d46;
            color: #d7d9df;
            border-radius: 12px;
        }

        .btn-secundario-dark:hover {
            background-color: #24262e;
            border-color: #4a4d57;
            color: #fff;
        }
    </style>
</head>

<body>

    {%if not is_admin%}

    <div class="container d-flex flex-row align-items-center justify-content-between mt-5 mb-5">
        <div>
            <h2 class="">{{ evento[2] }}</h2>
        </div>
        <form action="/evento/solicitar" method="POST">
            <input type="hidden" name="evento_id" value="{{ evento[0] }}">
            <button class="btn btn-primary w-5 py-2 mt-3">Entrar</button>
        </form>
    </div>

    {%endif%}

    {%if is_admin%}

    <div class="container d-flex flex-row align-items-center justify-content-between mt-5 mb-5">
        <div>
            <h2 class="">{{ evento[2] }}</h2>
        </div>

        <div class="input-group mb-3" style="max-width:500px;">
            <input type="text" class="form-control" id="linkEvento" value="{{ url }}" readonly>
            <button class="btn btn-outline-secondary" onclick="copiar()">
                <i class="bi bi-clipboard"></i>
            </button>
        </div>

        <button class="btn btn-secondary px-4 py-2" data-bs-toggle="modal" data-bs-target="#modalConfigEvento">
            Configurar evento
        </button>

        <form action="/evento/deletar" method="POST">
            <input type="hidden" name="evento_id" value="{{ evento[0] }}">
            <button class="btn btn-primary w-5 py-2 mt-3">Deletar evento</button>
        </form>
    </div>

    <div class="container">


        <div>
            <h3>Solicitações</h3>
        </div>

        {% include 'events/events_requests.html' %}

    </div>

    {%endif%}

    <div class="container">
        <div>
            <h3>Lista</h3>
        </div>

        <div id="lista">
            {%for usuario in usuarios%}
            <div class="row py-2">
                <div class="col">
                    <img class="me-4 rounded-circle border border-white"
                        src="{{ url_for('static', filename='uploads/usuarios/' ~ usuario[0] ~ '.png') }}" width="32"
                        height="32">
                    {{ usuario[1] }}
                </div>
                <div class="col d-flex justify-content-end">
                    <div>
                        <input type="checkbox">
                    </div>
                </div>
            </div>
            {%endfor%}
        </div>
    </div>

    <div class="modal fade" id="modalConfigEvento" tabindex="-1" aria-labelledby="modalConfigEventoLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h2 class="modal-title" id="modalConfigEventoLabel">Configuração do evento</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <div class="modal-body">
                    <form action="/editarEvento" method="post">

                        <input type="hidden" name="evento_id" value="{{evento[0]}}">

                        <div class="row g-3">

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" name="nome" value="{{evento[2]}}" required>
                                    <label>Nome</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="text" class="form-control" name="local" value="{{evento[3]}}" required>
                                    <label>Local</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="date" class="form-control" name="data" value="{{evento[4]}}" required>
                                    <label>Data</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="time" class="form-control" name="hora" value="{{evento[5]}}" required>
                                    <label>Hora</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <input type="number" class="form-control" name="limite" value="{{evento[6]}}"
                                        required>
                                    <label>Limite de convidados</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="form-floating">
                                    <select class="form-select" name="categoria" id="categoriaSelect" required>
                                        <option value="">Selecione</option>
                                        <option value="1" {{ 'selected' if evento[8]==1 else '' }}>Normal</option>
                                        <option value="2" {{ 'selected' if evento[8]==2 else '' }}>Racha</option>
                                        <option value="3" {{ 'selected' if evento[8]==3 else '' }}>Coletivo</option>
                                    </select>
                                    <label>Categoria</label>
                                </div>
                            </div>

                            <div id="campoRacha" class="col-12 d-none">
                                <div class="form-floating">
                                    <input type="number" class="form-control" name="valor_total"
                                        placeholder="Valor total" value="{{evento[9]}}">
                                    <label>Valor total (R$)</label>
                                </div>
                            </div>

                            <div id="campoColetivo" class="col-12 d-none">
                                <div class="form-floating">
                                    <textarea class="form-control" name="itens" placeholder="Itens"
                                        style="height: 100px">{{itens}}</textarea>
                                    <label>Itens (separados por vírgula)</label>
                                </div>
                            </div>

                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-secundario-dark" data-bs-dismiss="modal">
                                Cancelar
                            </button>
                            <button class="btn btn-evento" type="submit">
                                Salvar evento
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

</body>

</html>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const select = document.getElementById("categoriaSelect");
    const racha = document.getElementById("campoRacha");
    const coletivo = document.getElementById("campoColetivo");

    const inputRacha = racha.querySelector("input");
    const inputColetivo = coletivo.querySelector("textarea");

    function atualizarCampos() {
        const valor = select.value;

        // esconde e desativa tudo
        racha.classList.add("d-none");
        coletivo.classList.add("d-none");

        inputRacha.disabled = true;
        inputColetivo.disabled = true;

        if (valor === "2") {
            racha.classList.remove("d-none");
            inputRacha.disabled = false;
        }

        if (valor === "3") {
            coletivo.classList.remove("d-none");
            inputColetivo.disabled = false;
        }
    }

    select.addEventListener("change", atualizarCampos);
    atualizarCampos();
});
</script>
