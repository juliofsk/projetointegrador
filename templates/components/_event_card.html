{% for evento in eventos %}
<a href="/evento/{{ evento[7] }}"><div class="col">
    <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg"
        style="background-image: url('/static/img/{{ evento[8] }}');">
        <div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
            <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">{{ evento[2] }}</h3>
            <ul class="d-flex list-unstyled mt-auto">
                <li class="me-auto">
                    <img src="{{ url_for('static', filename='uploads/usuarios/' ~ evento[1] ~ '.png') }}" alt="Admin" width="32" height="32"
                        class="rounded-circle border border-white">
                </li>
                <li class="d-flex align-items-center me-3">
                    <svg class="bi me-2" width="1em" height="1em" role="img" aria-label="Location">
                        <use xlink:href="#geo-fill"></use>
                    </svg>
                    <small>{{ evento[3] }}</small> 
                </li>
                <li class="d-flex align-items-center">
                    <svg class="bi me-2" width="1em" height="1em" role="img" aria-label="Date">
                        <use xlink:href="#calendar3"></use>
                    </svg>
                    <small>{{ evento[4] }}</small> 
            </ul>
        </div>
    </div>
</div></a>
{% endfor %}
