<!DOCTYPE html>
<html lang="en">

<head>
    {% include 'partials/_head.html' %}
</head>

<body class="container py-4">

<h1 class="mb-4">Eventos anteriores</h1>

<div class="row g-4 mb-5">
{% for evento in anteriores_eventos %}
    <div class="col-lg-4 col-md-6 col-sm-12">

        <a href="/evento/{{ evento[7] }}" class="text-decoration-none">
            <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg"
                style="background-image: url('/static/img/{{ evento[8] }}'); background-size: cover; background-position: center;">

                <div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
                    <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">{{ evento[2] }}</h3>

                    <ul class="d-flex list-unstyled mt-auto align-items-center justify-content-between">
                        <li class="me-auto">
                            <img src="{{ url_for('static', filename='uploads/usuarios/' ~ evento[1] ~ '.png') }}"
                                width="32" height="32"
                                class="rounded-circle border border-white">
                        </li>

                        <li><small>{{ evento[3] }}</small></li>
                        <li><small>{{ evento[4] }}</small></li>
                    </ul>
                </div>

            </div>
        </a>

    </div>
{% endfor %}
</div>

<h1 class="mb-4">Próximos eventos</h1>

<div class="row g-4">
{% for evento in proximos_eventos %}
    <div class="col-lg-4 col-md-6 col-sm-12">

        <a href="/evento/{{ evento[7] }}" class="text-decoration-none">
            <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-4 shadow-lg"
                style="background-image: url('/static/img/{{ evento[8] }}'); background-size: cover; background-position: center;">

                <div class="d-flex flex-column h-100 p-5 pb-3 text-white text-shadow-1">
                    <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">{{ evento[2] }}</h3>

                    <ul class="d-flex list-unstyled mt-auto align-items-center justify-content-between">
                        <li class="me-auto">
                            <img src="{{ url_for('static', filename='uploads/usuarios/' ~ evento[1] ~ '.png') }}"
                                width="32" height="32"
                                class="rounded-circle border border-white">
                        </li>

                        <li><small>{{ evento[3] }}</small></li>
                        <li><small>{{ evento[4] }}</small></li>
                    </ul>
                </div>

            </div>
        </a>

    </div>
{% endfor %}
</div>

</body>
</html>
