<style>
    .modal-backdrop.show {
        opacity: 0.75;
    }

    .modal-content {
        background: #18191f;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 18px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.45);
        color: #f5f5f5;
    }

    .modal-header {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding: 1rem 1.25rem;
    }

    .modal-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: #ffffff;
    }

    .btn-close {
        filter: invert(1) grayscale(100%) brightness(200%);
        opacity: 0.8;
    }

    .btn-close:hover {
        opacity: 1;
    }

    .modal-body {
        padding: 1.25rem;
    }

    .form-floating > .form-control {
        background-color: #23252d;
        border: 1px solid #31343d;
        color: #ffffff;
        border-radius: 12px;
    }

    .form-floating > .form-control:focus {
        background-color: #23252d;
        color: #ffffff;
        border-color: #ff5c7c;
        box-shadow: 0 0 0 0.2rem rgba(255, 92, 124, 0.15);
    }

    .form-floating > label {
        color: #b8bcc7;
    }

    input[type="date"],
    input[type="time"] {
        color-scheme: dark;
    }

    .btn-evento {
        background-color: #ff5c7c;
        border: none;
        color: #fff;
        font-weight: 600;
        border-radius: 12px;
    }

    .btn-evento:hover {
        background-color: #e14d6c;
    }

    .btn-secundario-dark {
        background-color: transparent;
        border: 1px solid #3a3d46;
        color: #d7d9df;
        border-radius: 12px;
    }

    .btn-secundario-dark:hover {
        background-color: #24262e;
        border-color: #4a4d57;
        color: #fff;
    }
</style>


        <button class="btn btn-evento px-4 py-2"
            data-bs-toggle="modal"
            data-bs-target="#modalConfigEvento">
            Configurar evento
        </button>

<div class="modal fade" id="modalConfigEvento" tabindex="-1" aria-labelledby="modalConfigEventoLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h2 class="modal-title" id="modalConfigEventoLabel">Configuração do evento</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
            </div>

            <div class="modal-body">
                <form action="/criarEvento" method="post">

                    <div class="row g-3">
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="nomeEvento" name="nome" placeholder="Nome do evento" required>
                                <label for="nomeEvento">Nome</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="localEvento" name="local" placeholder="Local do evento" required>
                                <label for="localEvento">Local</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="date" class="form-control" id="dataEvento" name="data" required>
                                <label for="dataEvento">Data</label>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="time" class="form-control" id="horaEvento" name="hora" placeholder="Hora do evento" required>
                                <label for="horaEvento">Hora</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-floating">
                                <input type="number" class="form-control" id="limiteEvento" name="limite" placeholder="Limite de convidados" min="1" required>
                                <label for="limiteEvento">Limite de convidados</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="button" class="btn btn-secundario-dark px-4" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button class="btn btn-evento px-4" type="submit" value="criar">
                            Salvar evento
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
